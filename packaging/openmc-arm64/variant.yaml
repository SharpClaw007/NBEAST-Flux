# Single-cell variant config: native osx-arm64, nodagmc, nompi, python 3.12.
# Derived from the conda-forge openmc-feedstock osx_64 nodagmc/nompi variant,
# retargeted to Apple Silicon (deployment target 11.0, arm64 machine triple).
MACOSX_DEPLOYMENT_TARGET:
- '11.0'
MACOSX_SDK_VERSION:
- '11.0'
c_compiler:
- clang
c_compiler_version:
- '19'
c_stdlib:
- macosx_deployment_target
c_stdlib_version:
- '11.0'
cxx_compiler:
- clangxx
cxx_compiler_version:
- '19'
dagmc:
- nodagmc
hdf5:
- 1.14.6
libpng:
- '1.6'
macos_machine:
- arm64-apple-darwin20.0.0
mpi:
- nompi
mpi_prefix:
- nompi
mpich:
- '4'
numpy:
- '2'
openmpi:
- '5'
pin_run_as_build:
  python:
    min_pin: x.x
    max_pin: x.x
python:
- 3.12.* *_cpython
target_platform:
- osx-arm64
zip_keys:
- - c_compiler_version
  - cxx_compiler_version
- - mpi
  - mpi_prefix
