name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (linux-64, native OpenMC)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      # System libraries needed by the headless (offscreen) Qt platform plugin.
      - name: Headless Qt system libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      # Linux x86-64 has a native conda-forge OpenMC build (no Rosetta needed).
      - name: Set up conda env
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: nbeast-ci
          condarc: |
            channels:
              - conda-forge
          create-args: >-
            python=3.12
            openmc=0.15.3
            pyside6
            pyqtgraph
            vtk
            pytest
            pip

      - name: Install package + data downloader
        run: pip install -e . openmc_data_downloader==0.6.1

      # Cache the curated data so most runs skip the (flaky) per-nuclide downloads.
      - name: Cache cross-section data
        uses: actions/cache@v4
        with:
          path: data
          key: nbeast-xs-data-${{ hashFiles('spikes/fetch_data.py') }}

      - name: Fetch curated cross-section data
        run: python spikes/fetch_data.py data

      - name: Run tests
        env:
          OPENMC_CROSS_SECTIONS: ${{ github.workspace }}/data/cross_sections.xml
          QT_QPA_PLATFORM: offscreen
        run: pytest -v
